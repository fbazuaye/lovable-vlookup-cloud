<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>VLOOKUP – Offline</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f8f8fa;color:#1a1a2e;text-align:center;padding:2rem}
.card{max-width:420px}
h1{font-size:1.5rem;margin-bottom:.75rem}
p{color:#555;line-height:1.6}
button{margin-top:1.5rem;padding:.75rem 2rem;border:none;border-radius:8px;background:#2539d0;color:#fff;font-size:1rem;cursor:pointer}
</style>
</head>
<body>
<div class="card">
<h1>You're Offline</h1>
